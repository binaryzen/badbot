name: auth_bola_probe
description: >
  Authenticate as alice, confirm access to own orders, then probe bob's orders
  using alice's token. Expects a 403 on the cross-user request. A 200 response
  indicates a BOLA vulnerability — authorization is not enforcing ownership.

steps:
  - name: authenticate
    method: POST
    path: /auth
    body:
      username: alice
      password: password123
    extract:
      - field: "$.token"
        into: auth_token
      - field: "$.user_id"
        into: user_id
    expect_status: 200
    on_success: probe_own

  - name: probe_own
    method: GET
    path: "/users/{ctx:user_id}/orders"
    headers:
      Authorization: "Bearer {ctx:auth_token}"
    expect_status: 200
    on_success: probe_other

  - name: probe_other
    method: GET
    path: /users/2/orders
    headers:
      Authorization: "Bearer {ctx:auth_token}"
    expect_status: 403
    finding_on_unexpected:
      severity: HIGH
      urn: "urn:badbot:poc:msg:bola_detected"
      params: {}
